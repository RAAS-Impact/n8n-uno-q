services:
  unoq-relay:
    build: .
    image: ghcr.io/raasimpact/unoq-relay:latest
    # `unless-stopped` covers Q reboot (Docker daemon comes up with the OS and
    # restarts every container with this policy) and container/process crash
    # (socat exits → Docker restarts). The only thing it doesn't do is restart
    # after a manual `docker stop`, which is what we want during maintenance.
    restart: unless-stopped
    ports:
      # Binding defaults to all interfaces (0.0.0.0) — the "trusted-LAN"
      # deployment shape from docs/master-plan/12-multi-q.md §12.5.1: n8n on another machine on
      # the same LAN talks to the Q directly over TCP. There is no auth on
      # this path; only deploy with the default on networks you already
      # trust.
      #
      # Set UNOQ_RELAY_BIND=127.0.0.1 to restrict the listener to loopback
      # and require an SSH reverse tunnel from the consuming host — the
      # right choice for dev laptops and any time the LAN is untrusted and
      # you are not yet running the mTLS variant (deploy/relay-mtls/).
      #
      # For LAN deployments with a specific NIC, set UNOQ_RELAY_BIND to
      # that interface's IP (e.g. 192.168.1.42).
      - "${UNOQ_RELAY_BIND:-0.0.0.0}:${UNOQ_RELAY_PORT:-5775}:5775"
    volumes:
      # Mount /var/run as a DIRECTORY, not the socket file directly. Docker
      # file bind-mounts pin to the host inode at mount time — when arduino-
      # router deletes and recreates /var/run/arduino-router.sock (every
      # `systemctl restart arduino-router`), the container stays bound to the
      # old orphan inode and every connect(2) fails. Directory mounts re-
      # resolve the path on each access, so socat's per-connection dial sees
      # the current socket file. Mounted under /host/var/run to keep the
      # container's own /var/run untouched.
      - /var/run:/host/var/run:rw
    # Health check: the relay is healthy when socat is bound to the listen
    # port. busybox netstat is in the Alpine base; a missing LISTEN socket
    # surfaces in `docker ps` as (unhealthy) and is the typical signal that
    # something crashed at startup (port already in use after a prior crash,
    # bad UNOQ_RELAY_BIND, etc.) before n8n's first call ever tries to dial.
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln 2>/dev/null | grep -E ':5775[[:space:]]+.*LISTEN' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # socat is quiet by default but logs spike during arduino-router restarts
    # (per-fork ENOENT churn) — bound the disk footprint so the eMMC isn't
    # surprised. 10 MiB × 3 files ≈ keeps several days of dense logs.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
