services:
  unoq-relay:
    build: .
    image: ghcr.io/raasimpact/unoq-relay-mtls:latest
    # `unless-stopped` covers Q reboot (Docker daemon comes up with the OS and
    # restarts every container with this policy) and container/process crash
    # (stunnel exits → Docker restarts). The only thing it doesn't do is
    # restart after a manual `docker stop`, which is what we want during
    # maintenance.
    restart: unless-stopped
    ports:
      # Same binding semantics as the socat relay (deploy/relay/docker-
      # compose.yml): default is 0.0.0.0 (exposed on the host's LAN) because
      # mTLS is the gatekeeper here. Set UNOQ_RELAY_BIND=127.0.0.1 to
      # restrict to loopback for SSH-tunnel-only consumption.
      #
      # Pick a distinct UNOQ_RELAY_PORT if you want to run Variant A and
      # Variant C side-by-side on the same host.
      - "${UNOQ_RELAY_BIND:-0.0.0.0}:${UNOQ_RELAY_PORT:-5775}:5775"
    volumes:
      # Directory mount — see docs/master-plan/12-multi-q.md §12.5.1 for the rationale (same
      # docker file-bind-mount issue as the socat relay, resolved the same
      # way). stunnel dials through /host/var/run/arduino-router.sock.
      - /var/run:/host/var/run:rw
      # Operator supplies ca.pem, server.pem, server.key under ./certs/
      # before bringing the container up. See docs/master-plan/12-multi-q.md §12.5.3 for the
      # openssl bootstrap commands.
      - ./certs:/etc/stunnel/certs:ro
    # Health check: combines a listener bind check with a 30-day cert-expiry
    # warning. The container goes (unhealthy) when:
    #   1. stunnel isn't listening on 5775 (crashed, bad config), OR
    #   2. /etc/stunnel/certs/server.pem expires within 30 days.
    # Case 2 surfaces renewal hygiene on `docker ps` long before TLS
    # handshakes start failing — operators see the warning, run their pki
    # renewal flow, and the next `docker compose up -d` clears the flag.
    # busybox netstat + openssl are in the Alpine base (openssl pulled in by
    # the stunnel package).
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln 2>/dev/null | grep -E ':5775[[:space:]]+.*LISTEN' >/dev/null && openssl x509 -checkend $$((30*86400)) -noout -in /etc/stunnel/certs/server.pem >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # stunnel runs at debug = 4 (info-level) and logs handshake info per
    # connection — meaningful eMMC pressure on a busy board. 10 MiB × 3
    # files ≈ keeps several days of dense logs.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
