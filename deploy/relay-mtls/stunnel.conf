; unoq-relay — TLS-terminating relay in front of arduino-router's unix socket.
;
; Listens on TCP, requires a client certificate signed by the owner's CA,
; and — only on successful handshake — forwards the plaintext msgpack-rpc
; stream to /host/var/run/arduino-router.sock on the host.
;
; See CONTEXT.md §12.5.3 for the full design (Variant C — mTLS).

foreground = yes       ; run in the foreground so Docker sees stunnel's PID
pid =                  ; no pid file — the container lifecycle handles restart
debug = 4              ; info-level logs; bump to 5-7 for handshake-trace debugging
output = /dev/stderr

[unoq-relay]
accept = 5775
connect = /host/var/run/arduino-router.sock
cert = /etc/stunnel/certs/server.pem
key = /etc/stunnel/certs/server.key
CAfile = /etc/stunnel/certs/ca.pem
verifyPeer = yes       ; require the client to present a certificate
verifyChain = yes      ; check the presented cert against the CA chain
