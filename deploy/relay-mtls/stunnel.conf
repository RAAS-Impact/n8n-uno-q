; unoq-relay — TLS-terminating relay in front of arduino-router's unix socket.
;
; Listens on TCP, requires a client certificate signed by the owner's CA,
; and — only on successful handshake — forwards the plaintext msgpack-rpc
; stream to /host/var/run/arduino-router.sock on the host.
;
; See docs/master-plan/12-multi-q.md §12.5.3 for the full design.
;
; Note: stunnel 5.76+ does NOT accept `;` or `#` comments on the same line
; as a directive — they must be on their own lines. A trailing comment on
; `foreground = yes` makes stunnel read the whole line as the argument and
; refuse the config. Keep comments separate from directives.

; Run in the foreground so Docker sees stunnel's PID as PID 1.
foreground = yes

; No pid file — the container lifecycle handles restart.
pid =

; Info-level logs. Bump to 5-7 for handshake-trace debugging.
debug = 4
output = /dev/stderr

[unoq-relay]
accept = 5775
connect = /host/var/run/arduino-router.sock
cert = /etc/stunnel/certs/server.pem
key = /etc/stunnel/certs/server.key
CAfile = /etc/stunnel/certs/ca.pem

; Require the client to present a certificate whose chain verifies against
; CAfile above. This is normal CA-based mTLS.
;
; Do NOT also set `verifyPeer = yes` — despite the intuitive name, that is
; stunnel's cert-pinning mode: it requires the peer's leaf certificate to
; appear *inside* CAfile/CApath, not merely to be signed by the CA listed
; there. With our setup (CAfile = ca.pem, per-client leaf certs), turning
; verifyPeer on makes every real client fail the handshake with TLS
; alert 42 (bad_certificate). verifyChain alone is what we want.
verifyChain = yes
