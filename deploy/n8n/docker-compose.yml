services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - /var/run/arduino-router.sock:/var/run/arduino-router.sock
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
    environment:
      # Auth is handled by n8n's built-in user management — open /setup on first launch to create the owner.
      - GENERIC_TIMEZONE=Europe/Malta
      - TZ=Europe/Malta
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      # Since n8n 2.15.0 this flag also gates the temporary session data the editor
      # needs for log redaction; with it off the container spams "Skipping execution
      # data push: unable to resolve user for redaction". Leave on for a usable editor.
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      # LAN access via http://<q-hostname>:5678 — no TLS terminator in front of n8n.
      # Put a reverse proxy with a cert in front if exposing beyond the local network.
      - N8N_SECURE_COOKIE=false
      # Advertised URL for webhooks (Chat Trigger, Webhook nodes). Must be reachable
      # from the browser — the default `localhost` breaks the chat UI when the editor
      # is loaded over the LAN. Override via .env or shell env if linucs.local doesn't
      # resolve on your network (use the Q's IP instead).
      - N8N_HOST=${N8N_HOST:-linucs.local}
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - WEBHOOK_URL=${WEBHOOK_URL:-http://linucs.local:5678/}

volumes:
  n8n_data:
